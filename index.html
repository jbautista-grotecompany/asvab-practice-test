<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ASVAB Math Practice Test</title>

<link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,600;1,400&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --black: #0d0d0d;
    --white: #f5f4f0;
    --silver: #c4c4c4;
    --mid: #2a2a2a;
    --card: #161616;
    --border: #2e2e2e;
    --muted: #777;
    --correct-bg: #0f2d0f;
    --correct-border: #2e7d32;
    --correct-text: #81c784;
    --wrong-bg: #2d0f0f;
    --wrong-border: #c62828;
    --wrong-text: #ef9a9a;
    --reveal-bg: #0f2d0f;
    --reveal-border: #2e7d32;
    --reveal-text: #81c784;
  }

  body {
    font-family: 'Inter', -apple-system, sans-serif;
    background: var(--black);
    color: var(--white);
    min-height: 100vh;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: repeating-linear-gradient(
      -65deg,
      transparent,
      transparent 28px,
      rgba(255,255,255,0.02) 28px,
      rgba(255,255,255,0.02) 29px
    );
    pointer-events: none;
    z-index: 0;
  }

  header {
    background: var(--black);
    border-bottom: 1px solid var(--border);
    padding: 1.1rem 1.5rem;
    position: sticky;
    top: 0;
    z-index: 20;
  }

  .header-inner {
    max-width: 760px;
    margin: 0 auto;
    display: flex;
    align-items: center;
    gap: 1rem;
    flex-wrap: wrap;
  }

  .logo-mark {
    font-family: 'EB Garamond', Georgia, serif;
    font-size: 22px;
    font-weight: 600;
    letter-spacing: 0.04em;
    color: var(--white);
    line-height: 1;
  }

  .logo-mark span {
    color: var(--silver);
    font-style: italic;
    font-weight: 400;
  }

  .header-sub {
    font-size: 11px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    margin-top: 3px;
  }

  .score-pill {
    margin-left: auto;
    display: flex;
    align-items: center;
    gap: 12px;
    background: var(--mid);
    border: 1px solid var(--border);
    border-radius: 99px;
    padding: 7px 16px;
  }

  .score-num { font-weight: 600; font-size: 15px; color: var(--white); }
  .progress-bar { width: 80px; height: 4px; background: var(--border); border-radius: 9px; overflow: hidden; }
  .progress-fill { height: 100%; background: var(--silver); border-radius: 9px; transition: width 0.35s ease; width: 0%; }
  #done-display { font-size: 11px; color: var(--muted); }

  main {
    max-width: 760px;
    margin: 0 auto;
    padding: 2rem 1.25rem 7rem;
    position: relative;
    z-index: 1;
  }

  .section-label {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--muted);
    margin: 2.5rem 0 1rem;
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .section-label::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  .topic-group { margin-bottom: 2rem; }

  .topic-title {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: rgba(196,196,196,0.5);
    margin-bottom: 0.6rem;
    padding-left: 2px;
  }

  .q-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 1.25rem;
    margin-bottom: 0.75rem;
  }

  .q-meta {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 10px;
  }

  .tag {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 3px 10px;
    border-radius: 99px;
  }

  .tag-ar {
    background: rgba(196,196,196,0.12);
    color: var(--silver);
    border: 1px solid rgba(196,196,196,0.25);
  }

  .tag-mk {
    background: rgba(196,196,196,0.06);
    color: #a0a0a0;
    border: 1px solid rgba(196,196,196,0.15);
  }

  .q-num { font-size: 12px; color: var(--muted); }

  .q-text {
    font-size: 15px;
    line-height: 1.7;
    margin-bottom: 14px;
    color: var(--white);
  }

  .options { display: flex; flex-direction: column; gap: 7px; }

  .opt {
    display: block;
    width: 100%;
    text-align: left;
    padding: 10px 14px;
    font-size: 14px;
    font-family: 'Inter', sans-serif;
    border: 1px solid var(--border);
    border-radius: 7px;
    background: #1e1e1e;
    color: var(--white);
    cursor: pointer;
    transition: border-color 0.12s, background 0.12s;
  }

  .opt:hover:not(:disabled) { border-color: var(--silver); background: #262626; }

  .opt.correct { background: var(--correct-bg); border-color: var(--correct-border); color: var(--correct-text); font-weight: 500; }
  .opt.wrong   { background: var(--wrong-bg);   border-color: var(--wrong-border);   color: var(--wrong-text); }
  .opt.reveal  { background: var(--reveal-bg);  border-color: var(--reveal-border);  color: var(--reveal-text); font-weight: 500; }

  .explanation {
    display: none;
    margin-top: 12px;
    font-size: 13px;
    color: var(--muted);
    line-height: 1.65;
    padding: 10px 14px;
    background: #111;
    border-left: 2px solid var(--silver);
    border-radius: 0 6px 6px 0;
  }

  .explanation strong { color: var(--silver); }

  .graph-btn {
    display: inline-block;
    margin-top: 10px;
    font-family: 'Inter', sans-serif;
    font-size: 12px;
    cursor: pointer;
    background: transparent;
    color: var(--silver);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 5px 12px;
    transition: border-color 0.12s, background 0.12s;
  }

  .graph-btn:hover { border-color: var(--silver); background: var(--mid); }

  .graph-wrap {
    margin-top: 12px;
    background: #111;
    border-radius: 8px;
    overflow: hidden;
    text-align: center;
  }

  .graph-wrap canvas {
    max-width: 100%;
    height: auto;
  }

  /* Results modal */
  .modal-backdrop {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.82);
    z-index: 50;
    align-items: center;
    justify-content: center;
  }

  .modal-backdrop.open { display: flex; }

  .modal {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 2rem;
    max-width: 420px;
    width: 90%;
    text-align: center;
  }

  .modal-title {
    font-family: 'EB Garamond', serif;
    font-size: 26px;
    font-weight: 600;
    margin-bottom: 6px;
  }

  .modal-score {
    font-size: 52px;
    font-weight: 600;
    color: var(--silver);
    line-height: 1.1;
    margin: 1rem 0 0.25rem;
  }

  .modal-pct { font-size: 14px; color: var(--muted); margin-bottom: 1.5rem; }

  .modal-breakdown {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 1.5rem;
  }

  .breakdown-cell {
    background: #1e1e1e;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px;
  }

  .breakdown-label { font-size: 11px; color: var(--muted); letter-spacing: 0.06em; text-transform: uppercase; }
  .breakdown-val { font-size: 22px; font-weight: 600; margin-top: 2px; }

  .modal-sending { font-size: 13px; color: var(--muted); margin-bottom: 1rem; }
  .modal-sent { font-size: 13px; color: var(--correct-text); margin-bottom: 1rem; display: none; }

  .modal-btn {
    font-family: 'Inter', sans-serif;
    font-size: 14px;
    cursor: pointer;
    background: transparent;
    color: var(--silver);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 24px;
    transition: border-color 0.12s, background 0.12s;
    width: 100%;
  }

  .modal-btn:hover { border-color: var(--silver); background: var(--mid); }

  /* Watermark */
  .watermark {
    position: fixed;
    bottom: 20px;
    right: 22px;
    z-index: 10;
    display: flex;
    align-items: center;
    gap: 8px;
    pointer-events: none;
    user-select: none;
  }

  .watermark-line { width: 26px; height: 1px; background: rgba(196,196,196,0.25); }

  .watermark-text {
    font-family: 'EB Garamond', Georgia, serif;
    font-size: 13px;
    font-style: italic;
    color: rgba(196,196,196,0.3);
    letter-spacing: 0.04em;
    white-space: nowrap;
  }

  .footer-bar {
    max-width: 760px;
    margin: 2rem auto 0;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 12px;
    position: relative;
    z-index: 1;
  }

  .footer-note { font-size: 13px; color: var(--muted); }

  .reset-btn {
    font-family: 'Inter', sans-serif;
    font-size: 13px;
    cursor: pointer;
    background: transparent;
    color: var(--silver);
    border: 1px solid var(--border);
    border-radius: 7px;
    padding: 8px 18px;
    transition: border-color 0.12s, background 0.12s;
  }

  .reset-btn:hover { border-color: var(--silver); background: var(--mid); }

  @media (max-width: 500px) {
    .score-pill { width: 100%; justify-content: center; }
    .watermark { bottom: 12px; right: 12px; }
  }
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <div>
      <div class="logo-mark">ASVAB <span>Math Practice</span></div>
      <div class="header-sub">Arithmetic Reasoning &amp; Mathematics Knowledge</div>
    </div>
    <div class="score-pill">
      <span class="score-num" id="score-display">0 / 0</span>
      <div class="progress-bar"><div class="progress-fill" id="prog"></div></div>
      <span id="done-display">0 of 38</span>
    </div>
  </div>
</header>

<main>
  <div class="section-label">Part 1 &mdash; Arithmetic Reasoning</div>
  <div id="ar-container"></div>

  <div class="section-label">Part 2 &mdash; Mathematics Knowledge</div>
  <div id="mk-container"></div>

  <div class="footer-bar">
    <span class="footer-note" id="footer-note">Select an answer to begin.</span>
    <button class="reset-btn" onclick="resetTest()">&#8635;&nbsp; Reset test</button>
  </div>
</main>

<!-- Results Modal -->
<div class="modal-backdrop" id="modal">
  <div class="modal">
    <div class="modal-title">Test Complete</div>
    <div class="modal-score" id="modal-score">—</div>
    <div class="modal-pct" id="modal-pct"></div>
    <div class="modal-breakdown">
      <div class="breakdown-cell">
        <div class="breakdown-label">AR Score</div>
        <div class="breakdown-val" id="ar-score">—</div>
      </div>
      <div class="breakdown-cell">
        <div class="breakdown-label">MK Score</div>
        <div class="breakdown-val" id="mk-score">—</div>
      </div>
    </div>
    <div class="modal-sending" id="modal-sending">Sending results&#8230;</div>
    <div class="modal-sent" id="modal-sent">&#10003;&nbsp; Results sent to jbautista@grotecompany.com</div>
    <button class="modal-btn" onclick="closeModal()">Close &amp; review answers</button>
  </div>
</div>

<div class="watermark">
  <div class="watermark-line"></div>
  <div class="watermark-text">Created by Jacinto Bautista</div>
</div>

<script>
// ─── Question bank ───────────────────────────────────────────────
const AR_TOPICS = [
  {
    topic: "Distance, rate & time",
    questions: [
      { q: "A car travels at 55 mph for 3 hours. How far does it travel?", opts: ["155 mi","165 mi","175 mi","185 mi"], ans: 1, exp: "Distance = speed × time = 55 × 3 = 165 miles." },
      { q: "A train covers 360 miles in 6 hours. At the same speed, how long will it take to travel 480 miles?", opts: ["7 hrs","8 hrs","9 hrs","10 hrs"], ans: 1, exp: "Speed = 360 ÷ 6 = 60 mph. 480 ÷ 60 = 8 hours." },
      { q: "Two cars leave the same point at the same time traveling in opposite directions, one at 45 mph and one at 55 mph. How far apart are they after 2 hours?", opts: ["90 mi","110 mi","180 mi","200 mi"], ans: 3, exp: "Combined speed = 45 + 55 = 100 mph. 100 × 2 = 200 miles apart." },
    ]
  },
  {
    topic: "Ratios & proportions",
    questions: [
      { q: "A map uses a scale of 1 inch = 40 miles. If two cities are 3.5 inches apart on the map, what is the actual distance?", opts: ["100 mi","120 mi","140 mi","160 mi"], ans: 2, exp: "3.5 × 40 = 140 miles." },
      { q: "If 5 workers can complete a job in 12 days, how many days would it take 10 workers to complete the same job?", opts: ["4","6","8","10"], ans: 1, exp: "Double the workers = half the time. 12 ÷ 2 = 6 days." },
      { q: "A car uses 4 gallons of gas to travel 120 miles. At this rate, how many gallons are needed to travel 300 miles?", opts: ["8","10","12","15"], ans: 1, exp: "Rate = 120 ÷ 4 = 30 mpg. 300 ÷ 30 = 10 gallons." },
    ]
  },
  {
    topic: "Percentages",
    questions: [
      { q: "A $200 jacket is on sale for $160. What is the percent decrease in price?", opts: ["15%","20%","25%","30%"], ans: 1, exp: "Decrease = $40. 40 ÷ 200 = 0.20 = 20% decrease." },
      { q: "What is 35% of 280?", opts: ["84","90","98","105"], ans: 2, exp: "0.35 × 280 = 98." },
      { q: "A student answered 18 out of 24 questions correctly. What percent did the student get correct?", opts: ["70%","72%","75%","78%"], ans: 2, exp: "18 ÷ 24 = 0.75 = 75%." },
    ]
  },
  {
    topic: "Combined work problems",
    questions: [
      { q: "Pipe A fills a tank in 4 hours. Pipe B fills the same tank in 12 hours. Working together, how long does it take to fill the tank?", opts: ["2 hrs","3 hrs","4 hrs","6 hrs"], ans: 1, exp: "Combined rate = 1/4 + 1/12 = 3/12 + 1/12 = 4/12 = 1/3. Time = 3 hours." },
      { q: "Worker A can paint a fence in 6 hours. Worker B can paint it in 3 hours. How long if they work together?", opts: ["1 hr","2 hrs","3 hrs","4 hrs"], ans: 1, exp: "Combined rate = 1/6 + 1/3 = 1/6 + 2/6 = 3/6 = 1/2. Time = 2 hours." },
    ]
  },
  {
    topic: "Measurement & unit conversion",
    questions: [
      { q: "How many inches are in 4.5 feet?", opts: ["48 in","52 in","54 in","56 in"], ans: 2, exp: "1 foot = 12 inches. 4.5 × 12 = 54 inches." },
      { q: "A container holds 3 gallons of liquid. How many quarts is that? (1 gallon = 4 quarts)", opts: ["8 qt","10 qt","12 qt","16 qt"], ans: 2, exp: "3 × 4 = 12 quarts." },
    ]
  },
  {
    topic: "Interest & money math",
    questions: [
      { q: "John earns $2,400 per month. He spends 30% on rent. How much does he spend on rent each month?", opts: ["$480","$600","$720","$840"], ans: 2, exp: "0.30 × 2,400 = $720." },
      { q: "A $1,500 loan has a simple annual interest rate of 8%. How much interest is owed after 2 years?", opts: ["$120","$180","$240","$300"], ans: 2, exp: "I = P × r × t = 1,500 × 0.08 × 2 = $240." },
    ]
  },
];

const MK_TOPICS = [
  {
    topic: "Algebra — solving equations",
    questions: [
      { q: "Solve for x: 3(x − 4) = 18", opts: ["x = 6","x = 8","x = 10","x = 12"], ans: 2, exp: "Divide both sides by 3: x − 4 = 6. Add 4: x = 10." },
      { q: "If 6w + 4 = 8w, what is the value of w?", opts: ["1","2","3","4"], ans: 1, exp: "6w + 4 = 8w → 4 = 2w → w = 2." },
      { q: "If 2x + 3y = 12 and x = 3, what is y?", opts: ["y = 1","y = 2","y = 3","y = 4"], ans: 1, exp: "2(3) + 3y = 12 → 6 + 3y = 12 → 3y = 6 → y = 2." },
    ]
  },
  {
    topic: "Factoring & expressions",
    questions: [
      { q: "Factor completely: x² − 16", opts: ["(x−4)(x+4)","(x−8)(x+2)","(x+4)²","(x−4)²"], ans: 0, exp: "x² − 16 is a difference of squares: (x − 4)(x + 4)." },
      { q: "Expand: (x + 3)(x + 5)", opts: ["x² + 8x + 15","x² + 15x + 8","x² + 8x + 8","x² + 15x + 15"], ans: 0, exp: "FOIL: x² + 5x + 3x + 15 = x² + 8x + 15." },
      { q: "Simplify: 5x² + 3x − 2x² + 4x", opts: ["3x² + 7x","7x² + 7x","3x² + 4x","7x² + 3x"], ans: 0, exp: "Combine like terms: (5−2)x² + (3+4)x = 3x² + 7x." },
    ]
  },
  {
    topic: "Geometry — area & perimeter",
    questions: [
      { q: "A rectangle is cut in half to make two equal squares, each with an area of 25. What is the perimeter of the original rectangle?", opts: ["20","25","30","35"], ans: 2, exp: "Each square has side = 5. Rectangle is 5 × 10. Perimeter = 2(5+10) = 30." },
      { q: "What is the area of a triangle with a base of 8 cm and a height of 5 cm?", opts: ["13 cm²","20 cm²","40 cm²","80 cm²"], ans: 1, exp: "Area = ½ × base × height = ½ × 8 × 5 = 20 cm²." },
      { q: "A circle has a diameter of 10. What is its area? (π ≈ 3.14)", opts: ["31.4","78.5","157","314"], ans: 1, exp: "Radius = 10 ÷ 2 = 5. Area = π × r² = 3.14 × 25 = 78.5." },
    ]
  },
  {
    topic: "Geometry — volume",
    questions: [
      { q: "What is the volume of a rectangular box 5 m long, 4 m wide, and 3 m tall?", opts: ["36 m³","48 m³","60 m³","72 m³"], ans: 2, exp: "V = l × w × h = 5 × 4 × 3 = 60 m³." },
      { q: "A cylinder has a radius of 3 and a height of 5. What is its volume? (π ≈ 3.14)", opts: ["47.1","94.2","141.3","188.4"], ans: 2, exp: "V = π × r² × h = 3.14 × 9 × 5 = 141.3." },
      { q: "What is the volume of a cube with a side length of 5 cm?", opts: ["25 cm³","75 cm³","100 cm³","125 cm³"], ans: 3, exp: "V = s³ = 5³ = 125 cm³." },
    ]
  },
  {
    topic: "Coordinate geometry & slope",
    questions: [
      { q: "What is the slope of the line through (2, 3) and (6, 11)?", opts: ["1","2","3","4"], ans: 1, exp: "Slope = (11−3) ÷ (6−2) = 8 ÷ 4 = 2.", graph: "slope_two_points" },
      { q: "What is the y-intercept of the line y = 3x − 5?", opts: ["3","−3","5","−5"], ans: 3, exp: "In y = mx + b, b is the y-intercept. Here b = −5.", graph: "y_intercept" },
      { q: "Which point lies on the line y = 2x + 1?", opts: ["(1, 4)","(2, 6)","(3, 7)","(0, 2)"], ans: 2, exp: "Test (3, 7): y = 2(3) + 1 = 7. ✓ Others: (1,4)→3≠4, (2,6)→5≠6, (0,2)→1≠2.", graph: "point_on_line" },
    ]
  },
  {
    topic: "Exponents & square roots",
    questions: [
      { q: "What is the value of √25 + 3²?", opts: ["11","14","16","34"], ans: 1, exp: "√25 = 5. 3² = 9. 5 + 9 = 14." },
      { q: "If 5¹¹ = 5² × 5ⁿ, what is the value of n?", opts: ["5","7","9","13"], ans: 2, exp: "When multiplying same bases, add exponents: 2 + n = 11, so n = 9." },
      { q: "What is √169?", opts: ["11","12","13","14"], ans: 2, exp: "13 × 13 = 169, so √169 = 13." },
    ]
  },
  {
    topic: "Absolute value",
    questions: [
      { q: "What is the value of |4 × 3 − 20|?", opts: ["8","−8","32","−32"], ans: 0, exp: "Solve inside first: 4 × 3 = 12. Then 12 − 20 = −8. Absolute value of −8 is 8." },
      { q: "What is |24 − 26 × 2|?", opts: ["28","−28","76","52"], ans: 0, exp: "Multiply first: 26 × 2 = 52. Then 24 − 52 = −28. |−28| = 28." },
    ]
  },
  {
    topic: "Probability & factorials",
    questions: [
      { q: "A bag contains 4 red, 3 blue, 7 green, and 10 yellow marbles. What is the probability of randomly picking a red marble?", opts: ["1/4","1/6","4/21","4/24"], ans: 1, exp: "Total = 4+3+7+10 = 24. P(red) = 4/24 = 1/6." },
      { q: "What is the value of 5!?", opts: ["25","60","120","240"], ans: 2, exp: "5! = 5 × 4 × 3 × 2 × 1 = 120." },
    ]
  },
  {
    topic: "Number properties & order of operations",
    questions: [
      { q: "For all positive values of x less than 50, how many values are divisible by both 3 and 5?", opts: ["1","2","3","4"], ans: 2, exp: "Must be divisible by 15. Values: 15, 30, 45 — that's 3 values." },
      { q: "Evaluate: (8 ÷ 4) × 13(2)", opts: ["26","52","104","208"], ans: 1, exp: "Parentheses first: 8÷4=2. Then 13×2=26. Finally 2×26=52." },
      { q: "Which property is shown: 5 × (2 + 3) = 5×2 + 5×3?", opts: ["Commutative","Associative","Distributive","Identity"], ans: 2, exp: "Distributing multiplication across addition is the distributive property." },
    ]
  },
];

// ─── State ────────────────────────────────────────────────────────
let allQuestions = [];
let answered = 0, correct = 0;
let arCorrect = 0, mkCorrect = 0;
let arTotal = 0, mkTotal = 0;

function buildQuestionList() {
  allQuestions = [];
  AR_TOPICS.forEach(t => t.questions.forEach(q => allQuestions.push({ ...q, section: 'AR', topic: t.topic })));
  MK_TOPICS.forEach(t => t.questions.forEach(q => allQuestions.push({ ...q, section: 'MK', topic: t.topic })));
  arTotal = AR_TOPICS.reduce((s, t) => s + t.questions.length, 0);
  mkTotal = MK_TOPICS.reduce((s, t) => s + t.questions.length, 0);
}

// ─── Render ───────────────────────────────────────────────────────
function renderSection(topics, containerId, tagClass, tagLabel, globalOffset) {
  const c = document.getElementById(containerId);
  c.innerHTML = '';
  let gi = globalOffset;
  topics.forEach(topic => {
    const group = document.createElement('div');
    group.className = 'topic-group';
    const titleEl = document.createElement('div');
    titleEl.className = 'topic-title';
    titleEl.textContent = topic.topic;
    group.appendChild(titleEl);

    topic.questions.forEach((q, qi) => {
      const answerIndex = q.fixedAns !== undefined ? q.fixedAns : q.ans;
      const card = document.createElement('div');
      card.className = 'q-card';
      card.innerHTML =
        '<div class="q-meta">' +
          '<span class="tag ' + tagClass + '">' + tagLabel + '</span>' +
          '<span class="q-num">Q' + (gi + 1) + '</span>' +
        '</div>' +
        '<p class="q-text">' + q.q + '</p>' +
        '<div class="options">' +
          q.opts.map((opt, oi) =>
            '<button class="opt" id="opt-' + gi + '-' + oi + '" onclick="pick(' + gi + ',' + oi + ',' + answerIndex + ',\'' + q.section + '\')">' +
              String.fromCharCode(65 + oi) + '.&nbsp; ' + opt +
            '</button>'
          ).join('') +
        '</div>' +
        '<div class="explanation" id="exp-' + gi + '"><strong>Explanation:</strong> ' + q.exp +
        (q.graph ? ' <button class="graph-btn" onclick="toggleGraph(\'' + gi + '\',\'' + q.graph + '\')">Show graph ↓</button><div class="graph-wrap" id="graph-' + gi + '" style="display:none"><canvas id="canvas-' + gi + '" width="460" height="260"></canvas></div>' : '') +
      '</div>';
      group.appendChild(card);
      gi++;
    });
    c.appendChild(group);
  });
}

function pick(gi, oi, correctAns, section) {
  const total = allQuestions.length;
  const btns = [];
  let count = allQuestions[gi] ? allQuestions[gi].opts.length : 4;
  // determine option count dynamically
  for (let i = 0; i < 10; i++) {
    const b = document.getElementById('opt-' + gi + '-' + i);
    if (b) btns.push(b); else break;
  }
  if (btns[0] && btns[0].disabled) return;

  answered++;
  const isCorrect = oi === correctAns;
  if (isCorrect) {
    correct++;
    if (section === 'AR') arCorrect++;
    else mkCorrect++;
  }

  btns.forEach((b, i) => {
    b.disabled = true;
    if (i === oi && isCorrect) b.classList.add('correct');
    else if (i === oi) b.classList.add('wrong');
    else if (i === correctAns) b.classList.add('reveal');
  });

  document.getElementById('exp-' + gi).style.display = 'block';
  updateScore();

  // GA4 event per question
  gtag('event', 'question_answered', {
    question_index: gi + 1,
    section: section,
    correct: isCorrect
  });

  if (answered === allQuestions.length) showResults();
}

function updateScore() {
  const total = allQuestions.length;
  document.getElementById('score-display').textContent = correct + ' / ' + answered;
  document.getElementById('done-display').textContent = answered + ' of ' + total;
  document.getElementById('prog').style.width = Math.round((answered / total) * 100) + '%';
  document.getElementById('footer-note').textContent =
    answered === total
      ? 'Test complete! See your results above.'
      : answered + ' answered \u2014 ' + (total - answered) + ' remaining.';
}

function showResults() {
  const total = allQuestions.length;
  const pct = Math.round((correct / total) * 100);
  document.getElementById('modal-score').textContent = correct + ' / ' + total;
  document.getElementById('modal-pct').textContent = pct + '% correct';
  document.getElementById('ar-score').textContent = arCorrect + ' / ' + arTotal;
  document.getElementById('mk-score').textContent = mkCorrect + ' / ' + mkTotal;
  document.getElementById('modal').classList.add('open');

  // GA4 test_complete event
  gtag('event', 'test_complete', {
    score: correct,
    total: total,
    percent: pct,
    ar_score: arCorrect,
    mk_score: mkCorrect
  });

  // Send results via Formspree
  const payload = {
    name: 'ASVAB Practice Test Result',
    score: correct + ' / ' + total,
    percent: pct + '%',
    ar_score: arCorrect + ' / ' + arTotal,
    mk_score: mkCorrect + ' / ' + mkTotal,
    timestamp: new Date().toLocaleString(),
    url: window.location.href
  };

  fetch('https://formspree.io/f/mrewbwyb', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
    body: JSON.stringify(payload)
  })
  .then(r => {
    document.getElementById('modal-sending').style.display = 'none';
    document.getElementById('modal-sent').style.display = 'block';
  })
  .catch(() => {
    document.getElementById('modal-sending').textContent = 'Could not send results. Check network connection.';
  });
}

function closeModal() {
  document.getElementById('modal').classList.remove('open');
}

function resetTest() {
  answered = 0; correct = 0; arCorrect = 0; mkCorrect = 0;
  document.getElementById('modal-sending').style.display = 'block';
  document.getElementById('modal-sent').style.display = 'none';
  document.getElementById('footer-note').textContent = 'Select an answer to begin.';
  updateScore();
  buildQuestionList();
  renderSection(AR_TOPICS, 'ar-container', 'tag-ar', 'AR', 0);
  renderSection(MK_TOPICS, 'mk-container', 'tag-mk', 'MK', arTotal);
}

// ─── Graph helpers ────────────────────────────────────────────────
function toggleGraph(gi, type) {
  const wrap = document.getElementById('graph-' + gi);
  const btn = wrap.previousElementSibling;
  if (wrap.style.display === 'none') {
    wrap.style.display = 'block';
    btn.textContent = 'Hide graph ↑';
    const canvas = document.getElementById('canvas-' + gi);
    if (!canvas.dataset.drawn) {
      canvas.dataset.drawn = '1';
      drawGraph(canvas, type);
    }
  } else {
    wrap.style.display = 'none';
    btn.textContent = 'Show graph ↓';
  }
}

function drawGraph(canvas, type) {
  const ctx = canvas.getContext('2d');
  const W = canvas.width, H = canvas.height;
  const PAD = 48;
  const silver = '#c4c4c4';
  const muted = '#555';
  const gridCol = '#2a2a2a';
  const green = '#81c784';
  const red = '#ef9a9a';
  const blue = '#7eb8f7';

  ctx.clearRect(0, 0, W, H);
  ctx.fillStyle = '#111';
  ctx.fillRect(0, 0, W, H);

  // coordinate range depends on graph type
  let xMin, xMax, yMin, yMax;
  if (type === 'slope_two_points') { xMin=-1; xMax=9; yMin=-1; yMax=14; }
  else if (type === 'y_intercept')  { xMin=-2; xMax=5; yMin=-8; yMax=12; }
  else                              { xMin=-1; xMax=5; yMin=-1; yMax=12; }

  function toPixel(x, y) {
    const px = PAD + (x - xMin) / (xMax - xMin) * (W - PAD*2);
    const py = H - PAD - (y - yMin) / (yMax - yMin) * (H - PAD*2);
    return [px, py];
  }

  // grid
  ctx.strokeStyle = gridCol;
  ctx.lineWidth = 0.5;
  for (let gx = Math.ceil(xMin); gx <= xMax; gx++) {
    const [px] = toPixel(gx, 0);
    ctx.beginPath(); ctx.moveTo(px, PAD); ctx.lineTo(px, H - PAD); ctx.stroke();
  }
  for (let gy = Math.ceil(yMin); gy <= yMax; gy++) {
    const [, py] = toPixel(0, gy);
    ctx.beginPath(); ctx.moveTo(PAD, py); ctx.lineTo(W - PAD, py); ctx.stroke();
  }

  // axes
  ctx.strokeStyle = muted;
  ctx.lineWidth = 1;
  const [ax0] = toPixel(0, yMin); const [ax1] = toPixel(0, yMax);
  const [,ay0] = toPixel(xMin, 0); const [,ay1] = toPixel(xMax, 0);
  ctx.beginPath(); ctx.moveTo(ax0, PAD); ctx.lineTo(ax0, H-PAD); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(PAD, ay0); ctx.lineTo(W-PAD, ay0); ctx.stroke();

  // axis labels
  ctx.fillStyle = muted;
  ctx.font = '11px Inter, sans-serif';
  ctx.textAlign = 'center';
  for (let gx = Math.ceil(xMin); gx <= xMax; gx++) {
    if (gx === 0) continue;
    const [px, py] = toPixel(gx, 0);
    ctx.fillText(gx, px, py + 14);
  }
  ctx.textAlign = 'right';
  for (let gy = Math.ceil(yMin); gy <= yMax; gy++) {
    if (gy === 0) continue;
    const [px, py] = toPixel(0, gy);
    ctx.fillText(gy, px - 5, py + 4);
  }

  // axis labels x/y
  ctx.fillStyle = silver;
  ctx.font = '12px Inter, sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText('x', W - PAD + 14, ay0 + 4);
  ctx.fillText('y', ax0, PAD - 10);

  function drawLine(m, b, color) {
    ctx.strokeStyle = color;
    ctx.lineWidth = 2;
    ctx.beginPath();
    const x0 = xMin, y0 = m * x0 + b;
    const x1 = xMax, y1 = m * x1 + b;
    const [p0x, p0y] = toPixel(x0, y0);
    const [p1x, p1y] = toPixel(x1, y1);
    ctx.moveTo(p0x, p0y); ctx.lineTo(p1x, p1y); ctx.stroke();
  }

  function dot(x, y, color, label, labelPos) {
    const [px, py] = toPixel(x, y);
    ctx.beginPath();
    ctx.arc(px, py, 5, 0, Math.PI*2);
    ctx.fillStyle = color;
    ctx.fill();
    if (label) {
      ctx.fillStyle = color;
      ctx.font = '12px Inter, sans-serif';
      ctx.textAlign = labelPos === 'left' ? 'right' : 'left';
      const ox = labelPos === 'left' ? -10 : 10;
      ctx.fillText(label, px + ox, py - 6);
    }
  }

  function drawRiseRun(x1,y1,x2,y2) {
    const [p1x,p1y] = toPixel(x1,y1);
    const [p2x,p2y] = toPixel(x2,y2);
    const [cornerX,cornerY] = toPixel(x2,y1);
    ctx.strokeStyle = '#555';
    ctx.lineWidth = 1;
    ctx.setLineDash([4,3]);
    ctx.beginPath(); ctx.moveTo(p1x,p1y); ctx.lineTo(cornerX,cornerY); ctx.lineTo(p2x,p2y); ctx.stroke();
    ctx.setLineDash([]);
    ctx.fillStyle = muted;
    ctx.font = '11px Inter, sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('run = 4', (p1x+cornerX)/2, cornerY+14);
    ctx.textAlign = 'left';
    ctx.fillText('rise = 8', cornerX+6, (cornerY+p2y)/2);
  }

  if (type === 'slope_two_points') {
    drawLine(2, -1, green);
    drawRiseRun(2,3,6,11);
    dot(2, 3, silver, '(2, 3)', 'left');
    dot(6, 11, silver, '(6, 11)', 'left');
    ctx.fillStyle = green;
    ctx.font = '12px Inter, sans-serif';
    ctx.textAlign = 'left';
    ctx.fillText('slope = rise/run = 8/4 = 2', PAD + 4, PAD + 16);

  } else if (type === 'y_intercept') {
    drawLine(3, -5, green);
    dot(0, -5, blue, 'y-intercept (0, −5)', 'right');
    // show where it crosses x axis too
    dot(5/3, 0, muted, null, 'right');
    ctx.fillStyle = green;
    ctx.font = '12px Inter, sans-serif';
    ctx.textAlign = 'left';
    ctx.fillText('y = 3x − 5', PAD + 4, PAD + 16);
    ctx.fillStyle = blue;
    ctx.fillText('b = −5  (y-intercept)', PAD + 4, PAD + 32);

  } else if (type === 'point_on_line') {
    drawLine(2, 1, green);
    const points = [[1,4],[2,6],[3,7],[0,2]];
    const colors = [red, red, silver, red];
    const labels = ['A(1,4)','B(2,6)','C(3,7) ✓','D(0,2)'];
    points.forEach(([x,y], i) => dot(x, y, colors[i], labels[i], x < 2 ? 'left' : 'right'));
    ctx.fillStyle = green;
    ctx.font = '12px Inter, sans-serif';
    ctx.textAlign = 'left';
    ctx.fillText('y = 2x + 1', PAD + 4, PAD + 16);
    ctx.fillStyle = silver;
    ctx.fillText('C(3,7) lies on the line', PAD + 4, PAD + 32);
  }
}

// ─── Init ─────────────────────────────────────────────────────────
buildQuestionList();
renderSection(AR_TOPICS, 'ar-container', 'tag-ar', 'AR', 0);
renderSection(MK_TOPICS, 'mk-container', 'tag-mk', 'MK', arTotal);
document.getElementById('done-display').textContent = '0 of ' + allQuestions.length;
</script>
