<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ASVAB Math Practice Test</title>
<link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,600;1,400&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --black: #0d0d0d;
    --white: #f5f4f0;
    --silver: #c4c4c4;
    --mid: #2a2a2a;
    --card: #161616;
    --border: #2e2e2e;
    --muted: #888;
    --ar-bg: #1a1a1a;
    --ar-accent: #c4c4c4;
    --mk-bg: #1a1a1a;
    --mk-accent: #a0a0a0;
    --correct-bg: #0f2d0f;
    --correct-border: #2e7d32;
    --correct-text: #81c784;
    --wrong-bg: #2d0f0f;
    --wrong-border: #c62828;
    --wrong-text: #ef9a9a;
    --reveal-bg: #0f2d0f;
    --reveal-border: #2e7d32;
    --reveal-text: #81c784;
    --progress-fill: #c4c4c4;
  }

  body {
    font-family: 'Inter', -apple-system, sans-serif;
    background: var(--black);
    color: var(--white);
    min-height: 100vh;
  }

  /* Diagonal pinstripes */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: repeating-linear-gradient(
      -65deg,
      transparent,
      transparent 28px,
      rgba(255,255,255,0.022) 28px,
      rgba(255,255,255,0.022) 29px
    );
    pointer-events: none;
    z-index: 0;
  }

  header {
    background: var(--black);
    border-bottom: 1px solid var(--border);
    padding: 1.1rem 1.5rem;
    position: sticky;
    top: 0;
    z-index: 20;
  }

  .header-inner {
    max-width: 740px;
    margin: 0 auto;
    display: flex;
    align-items: center;
    gap: 1rem;
    flex-wrap: wrap;
  }

  .logo-mark {
    font-family: 'EB Garamond', Georgia, serif;
    font-size: 22px;
    font-weight: 600;
    letter-spacing: 0.04em;
    color: var(--white);
    line-height: 1;
    white-space: nowrap;
  }

  .logo-mark span {
    color: var(--silver);
    font-style: italic;
    font-weight: 400;
  }

  .header-sub {
    font-size: 11px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    margin-top: 3px;
  }

  .score-pill {
    margin-left: auto;
    display: flex;
    align-items: center;
    gap: 12px;
    background: var(--mid);
    border: 1px solid var(--border);
    border-radius: 99px;
    padding: 7px 16px;
    font-size: 13px;
  }

  .score-num { font-weight: 600; font-size: 15px; color: var(--white); }
  .progress-bar { width: 72px; height: 4px; background: var(--border); border-radius: 9px; overflow: hidden; }
  .progress-fill { height: 100%; background: var(--progress-fill); border-radius: 9px; transition: width 0.35s ease; width: 0%; }
  #done-display { font-size: 11px; color: var(--muted); }

  main {
    max-width: 740px;
    margin: 0 auto;
    padding: 2rem 1.25rem 6rem;
    position: relative;
    z-index: 1;
  }

  .section-label {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--muted);
    margin: 2.5rem 0 1rem;
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .section-label::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  .q-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 1.25rem;
    margin-bottom: 1rem;
  }

  .q-meta {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 10px;
  }

  .tag {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 3px 10px;
    border-radius: 99px;
  }

  .tag-ar {
    background: rgba(196,196,196,0.12);
    color: var(--silver);
    border: 1px solid rgba(196,196,196,0.25);
  }

  .tag-mk {
    background: rgba(196,196,196,0.06);
    color: #a0a0a0;
    border: 1px solid rgba(196,196,196,0.15);
  }

  .q-num { font-size: 12px; color: var(--muted); }

  .q-text {
    font-size: 15px;
    line-height: 1.7;
    margin-bottom: 14px;
    color: var(--white);
  }

  .options { display: flex; flex-direction: column; gap: 7px; }

  .opt {
    display: block;
    width: 100%;
    text-align: left;
    padding: 10px 14px;
    font-size: 14px;
    font-family: 'Inter', sans-serif;
    border: 1px solid var(--border);
    border-radius: 7px;
    background: #1e1e1e;
    color: var(--white);
    cursor: pointer;
    transition: border-color 0.12s, background 0.12s;
  }

  .opt:hover:not(:disabled) {
    border-color: var(--silver);
    background: #262626;
  }

  .opt.correct {
    background: var(--correct-bg);
    border-color: var(--correct-border);
    color: var(--correct-text);
    font-weight: 500;
  }

  .opt.wrong {
    background: var(--wrong-bg);
    border-color: var(--wrong-border);
    color: var(--wrong-text);
  }

  .opt.reveal {
    background: var(--reveal-bg);
    border-color: var(--reveal-border);
    color: var(--reveal-text);
    font-weight: 500;
  }

  .explanation {
    display: none;
    margin-top: 12px;
    font-size: 13px;
    color: var(--muted);
    line-height: 1.65;
    padding: 10px 14px;
    background: #111;
    border-left: 2px solid var(--silver);
    border-radius: 0 6px 6px 0;
  }

  .explanation strong { color: var(--silver); }

  /* Watermark */
  .watermark {
    position: fixed;
    bottom: 22px;
    right: 24px;
    z-index: 100;
    display: flex;
    align-items: center;
    gap: 8px;
    pointer-events: none;
    user-select: none;
  }

  .watermark-line {
    width: 28px;
    height: 1px;
    background: rgba(196,196,196,0.3);
  }

  .watermark-text {
    font-family: 'EB Garamond', Georgia, serif;
    font-size: 13px;
    font-style: italic;
    color: rgba(196,196,196,0.35);
    letter-spacing: 0.04em;
    white-space: nowrap;
  }

  .footer-bar {
    max-width: 740px;
    margin: 2rem auto 0;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 12px;
    position: relative;
    z-index: 1;
  }

  .footer-note { font-size: 13px; color: var(--muted); }

  .reset-btn {
    font-family: 'Inter', sans-serif;
    font-size: 13px;
    cursor: pointer;
    background: transparent;
    color: var(--silver);
    border: 1px solid var(--border);
    border-radius: 7px;
    padding: 8px 18px;
    letter-spacing: 0.03em;
    transition: border-color 0.12s, background 0.12s;
  }

  .reset-btn:hover {
    border-color: var(--silver);
    background: var(--mid);
  }

  @media (max-width: 500px) {
    .score-pill { width: 100%; justify-content: center; }
    .watermark { bottom: 14px; right: 14px; }
  }
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <div>
      <div class="logo-mark">ASVAB <span>Math Practice</span></div>
      <div class="header-sub">20 questions &mdash; Arithmetic Reasoning &amp; Mathematics Knowledge</div>
    </div>
    <div class="score-pill">
      <span class="score-num" id="score-display">0 / 0</span>
      <div class="progress-bar"><div class="progress-fill" id="prog"></div></div>
      <span id="done-display">0 of 20</span>
    </div>
  </div>
</header>

<main>
  <div class="section-label">Part 1 &mdash; Arithmetic Reasoning</div>
  <div id="ar-container"></div>

  <div class="section-label">Part 2 &mdash; Mathematics Knowledge</div>
  <div id="mk-container"></div>

  <div class="footer-bar">
    <span class="footer-note" id="footer-note">Select an answer to begin.</span>
    <button class="reset-btn" onclick="resetTest()">&#8635;&nbsp; Reset test</button>
  </div>
</main>

<div class="watermark">
  <div class="watermark-line"></div>
  <div class="watermark-text">Created by Jacinto Bautista</div>
</div>

<script>
const AR = [
  { q: "A soldier runs 3 miles in 24 minutes. At that same pace, how long will it take to run 5 miles?", opts: ["36 min", "40 min", "42 min", "45 min"], ans: 1, exp: "Rate = 24 ÷ 3 = 8 min/mile. 5 × 8 = 40 minutes." },
  { q: "A supply truck carries 2,400 lbs of cargo. Each crate weighs 150 lbs. How many crates are on the truck?", opts: ["14", "16", "18", "20"], ans: 1, exp: "2,400 ÷ 150 = 16 crates." },
  { q: "A soldier earns $1,800 per month and saves 25% of it. How much does he save in one year?", opts: ["$450", "$2,700", "$5,400", "$21,600"], ans: 2, exp: "25% of $1,800 = $450/month. $450 × 12 = $5,400." },
  { q: "If 4 soldiers can dig a trench in 6 hours, how long would it take 8 soldiers to dig the same trench?", opts: ["2 hours", "3 hours", "4 hours", "12 hours"], ans: 1, exp: "Double the workers = half the time. 6 ÷ 2 = 3 hours." },
  { q: "A map uses a scale of 1 inch = 25 miles. Two bases are 7 inches apart on the map. What is the actual distance?", opts: ["32 miles", "150 miles", "175 miles", "200 miles"], ans: 2, exp: "7 × 25 = 175 miles." },
  { q: "A unit has 120 soldiers. 45 are on leave. What percent are on leave?", opts: ["35%", "37.5%", "40%", "42%"], ans: 1, exp: "45 ÷ 120 = 0.375 = 37.5%." },
  { q: "A water tank holds 500 gallons and is 60% full. How many more gallons are needed to fill it?", opts: ["200", "250", "300", "350"], ans: 0, exp: "60% of 500 = 300 gallons already in tank. 500 − 300 = 200 more needed." },
  { q: "Boots cost $85 and are on sale for 20% off. What is the sale price?", opts: ["$65", "$68", "$72", "$75"], ans: 1, exp: "20% of $85 = $17. $85 − $17 = $68." },
  { q: "Train A goes 60 mph and Train B goes 90 mph in opposite directions from the same point. How far apart after 2 hours?", opts: ["120 mi", "180 mi", "270 mi", "300 mi"], ans: 3, exp: "Train A: 60×2=120 mi. Train B: 90×2=180 mi. Total: 120+180=300 miles apart." },
  { q: "A recipe needs 2.5 cups of flour for 24 cookies. How much flour for 60 cookies?", opts: ["5 cups", "6 cups", "6.25 cups", "7 cups"], ans: 2, exp: "60 ÷ 24 = 2.5× the recipe. 2.5 × 2.5 = 6.25 cups." },
];

const MK = [
  { q: "Solve for x: 3x − 7 = 14", opts: ["x = 5", "x = 6", "x = 7", "x = 8"], ans: 2, exp: "3x = 14 + 7 = 21. x = 21 ÷ 3 = 7." },
  { q: "What is the area of a triangle with base 10 cm and height 6 cm?", opts: ["16 cm²", "30 cm²", "60 cm²", "120 cm²"], ans: 1, exp: "Area = ½ × base × height = ½ × 10 × 6 = 30 cm²." },
  { q: "Simplify: 4² + √9", opts: ["7", "19", "25", "13"], ans: 1, exp: "4² = 16. √9 = 3. 16 + 3 = 19." },
  { q: "Which of the following is a prime number?", opts: ["21", "27", "29", "33"], ans: 2, exp: "29 is only divisible by 1 and itself. The others are divisible by 3 or 7." },
  { q: "What is the perimeter of a rectangle with length 12 m and width 5 m?", opts: ["17 m", "34 m", "60 m", "70 m"], ans: 1, exp: "Perimeter = 2(length + width) = 2(12 + 5) = 34 m." },
  { q: "Factor the expression: x² − 9", opts: ["(x−3)(x+3)", "(x−9)(x+1)", "(x+3)²", "(x−3)²"], ans: 0, exp: "x² − 9 is a difference of squares: (x − 3)(x + 3)." },
  { q: "If 2x + 3y = 12 and x = 3, what is y?", opts: ["y = 1", "y = 2", "y = 3", "y = 4"], ans: 1, exp: "2(3) + 3y = 12 → 6 + 3y = 12 → 3y = 6 → y = 2." },
  { q: "A circle has a radius of 7. What is its area? (Use π ≈ 3.14)", opts: ["43.96", "153.86", "219.8", "44"], ans: 1, exp: "Area = π × r² = 3.14 × 49 = 153.86." },
  { q: "What is the value of |−15 + 4|?", opts: ["11", "−11", "19", "−19"], ans: 0, exp: "−15 + 4 = −11. Absolute value of −11 is 11." },
  { q: "What is the slope of the line passing through (2, 3) and (6, 11)?", opts: ["1", "2", "3", "4"], ans: 1, exp: "Slope = (11 − 3) ÷ (6 − 2) = 8 ÷ 4 = 2." },
];

let answered = 0, correct = 0;
const total = AR.length + MK.length;

function render(questions, containerId, tagClass, tagLabel, offset) {
  const c = document.getElementById(containerId);
  c.innerHTML = '';
  questions.forEach((q, i) => {
    const gi = offset + i;
    const card = document.createElement('div');
    card.className = 'q-card';
    card.innerHTML =
      '<div class="q-meta">' +
        '<span class="tag ' + tagClass + '">' + tagLabel + '</span>' +
        '<span class="q-num">Question ' + (gi + 1) + ' of ' + total + '</span>' +
      '</div>' +
      '<p class="q-text">' + q.q + '</p>' +
      '<div class="options">' +
        q.opts.map((opt, oi) =>
          '<button class="opt" id="opt-' + gi + '-' + oi + '" onclick="pick(' + gi + ',' + oi + ')">' +
            String.fromCharCode(65 + oi) + '.&nbsp; ' + opt +
          '</button>'
        ).join('') +
      '</div>' +
      '<div class="explanation" id="exp-' + gi + '"><strong>Explanation:</strong> ' + q.exp + '</div>';
    c.appendChild(card);
  });
}

function pick(gi, oi) {
  const all = [...AR, ...MK];
  const q = all[gi];
  const btns = [];
  for (let i = 0; i < q.opts.length; i++) btns.push(document.getElementById('opt-' + gi + '-' + i));
  if (btns[0].disabled) return;

  answered++;
  if (oi === q.ans) correct++;

  btns.forEach((b, i) => {
    b.disabled = true;
    if (i === oi && i === q.ans) b.classList.add('correct');
    else if (i === oi) b.classList.add('wrong');
    else if (i === q.ans) b.classList.add('reveal');
  });

  document.getElementById('exp-' + gi).style.display = 'block';
  updateScore();
}

function updateScore() {
  document.getElementById('score-display').textContent = correct + ' / ' + answered;
  document.getElementById('done-display').textContent = answered + ' of ' + total;
  document.getElementById('prog').style.width = Math.round((answered / total) * 100) + '%';
  if (answered === total) {
    const pct = Math.round((correct / total) * 100);
    document.getElementById('footer-note').textContent =
      'Test complete! You scored ' + correct + ' / ' + total + ' (' + pct + '%). Hit reset to try again.';
  } else {
    document.getElementById('footer-note').textContent =
      answered + ' answered \u2014 ' + (total - answered) + ' remaining.';
  }
}

function resetTest() {
  answered = 0; correct = 0;
  document.getElementById('footer-note').textContent = 'Select an answer to begin.';
  updateScore();
  render(AR, 'ar-container', 'tag-ar', 'AR', 0);
  render(MK, 'mk-container', 'tag-mk', 'MK', AR.length);
}

render(AR, 'ar-container', 'tag-ar', 'AR', 0);
render(MK, 'mk-container', 'tag-mk', 'MK', AR.length);
</script>
</body>
</html>
